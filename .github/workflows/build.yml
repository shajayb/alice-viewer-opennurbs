name: Cross-Platform Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libxinerama-dev libxcursor-dev xorg-dev libgl1-mesa-dev pkg-config ninja-build clang lld
        # Try to update vcpkg baseline cache if needed
        cd "$VCPKG_INSTALLATION_ROOT"
        git fetch --unshallow || true
        git fetch origin master

    - name: Install Windows Dependencies
      if: runner.os == 'Windows'
      run: |
        choco install ninja llvm
        # Add LLVM to path for clang-cl
        echo "C:\Program Files\LLVM\bin" >> $GITHUB_PATH
        # Ensure Ninja is in path
        echo "C:\ProgramData\chocolatey\bin" >> $GITHUB_PATH
        # Try to update vcpkg baseline cache
        cd "$VCPKG_INSTALLATION_ROOT"
        git fetch --unshallow || true
        git fetch origin master

    - name: Configure CMake
      shell: bash
      run: |
        # Ensure Ninja is findable by setting it in the environment as well
        export CMAKE_MAKE_PROGRAM=$(which ninja 2>/dev/null || echo "C:/ProgramData/chocolatey/bin/ninja.exe")
        
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          cmake -B build -S . -G Ninja \
          -DCMAKE_C_COMPILER="C:/Program Files/LLVM/bin/clang-cl.exe" \
          -DCMAKE_CXX_COMPILER="C:/Program Files/LLVM/bin/clang-cl.exe" \
          -DCMAKE_MAKE_PROGRAM="C:/ProgramData/chocolatey/bin/ninja.exe" \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
          -DVCPKG_TARGET_TRIPLET=x64-windows-static \
          -DVCPKG_OVERLAY_PORTS="${GITHUB_WORKSPACE}/vcpkg-overlay-ports/ports"
        else
          cmake -B build -S . -G Ninja \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
          -DVCPKG_OVERLAY_PORTS="${GITHUB_WORKSPACE}/vcpkg-overlay-ports/ports"
        fi

    - name: Build
      shell: bash
      run: cmake --build build --config ${{ matrix.build_type }}

    - name: Post-Build (Linux Strip)
      if: runner.os == 'Linux'
      run: strip build/bin/AliceViewer

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AliceViewer-${{ matrix.os }}
        path: |
          build/bin/AliceViewer
          build/bin/AliceViewer.exe
        if-no-files-found: error
