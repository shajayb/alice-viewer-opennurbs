name: Windows CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest
    env:
      VCPKG_INSTALLATION_ROOT: C:\vcpkg
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Install Windows Dependencies
      run: |
        choco install ninja llvm
        # Add LLVM to path for clang-cl
        echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # Ensure Ninja is in path
        echo "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # Fix vcpkg git issue
        if (Test-Path "$env:VCPKG_INSTALLATION_ROOT\.git") {
            cd "$env:VCPKG_INSTALLATION_ROOT"
            git config core.worktree "$env:VCPKG_INSTALLATION_ROOT"
            git fetch --unshallow
            git fetch origin master
        }

    - name: Restore vcpkg Cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.VCPKG_INSTALLATION_ROOT }}/installed
          ${{ env.VCPKG_INSTALLATION_ROOT }}/packages
          ${{ env.VCPKG_INSTALLATION_ROOT }}/buildtrees
          ${{ env.VCPKG_INSTALLATION_ROOT }}/downloads
        key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}-${{ hashFiles('vcpkg-overlay-ports/**') }}
        restore-keys: |
          vcpkg-windows-

    - name: Configure CMake
      shell: bash
      run: |
        cmake -B build -S . -G Ninja \
        -DCMAKE_C_COMPILER="C:/Program Files/LLVM/bin/clang-cl.exe" \
        -DCMAKE_CXX_COMPILER="C:/Program Files/LLVM/bin/clang-cl.exe" \
        -DCMAKE_MAKE_PROGRAM="C:/ProgramData/chocolatey/bin/ninja.exe" \
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
        -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
        -DVCPKG_TARGET_TRIPLET=x64-windows \
        -DVCPKG_OVERLAY_PORTS="${GITHUB_WORKSPACE}/vcpkg-overlay-ports/ports"

    - name: Build
      shell: bash
      run: cmake --build build --config ${{ matrix.build_type }}

    - name: Execute Headless Tests
      shell: bash
      run: ./build/bin/AliceViewer.exe --headless

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AliceViewer-Windows
        path: build/bin/AliceViewer.exe
        if-no-files-found: error
