name: Cross-Platform Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libxinerama-dev libxcursor-dev xorg-dev libgl1-mesa-dev pkg-config ninja-build clang lld uuid-dev
        # Fix vcpkg git issue if present
        if [ -d "$VCPKG_INSTALLATION_ROOT/.git" ]; then
          cd "$VCPKG_INSTALLATION_ROOT"
          git config core.worktree "$VCPKG_INSTALLATION_ROOT"
          git fetch --unshallow || true
          git fetch origin master
        fi

    - name: Install Windows Dependencies
      if: runner.os == 'Windows'
      run: |
        choco install ninja llvm
        # Add LLVM to path for clang-cl
        echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # Ensure Ninja is in path
        echo "C:\ProgramData\chocolatey\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # Fix vcpkg git issue
        if (Test-Path "$env:VCPKG_INSTALLATION_ROOT\.git") {
            cd "$env:VCPKG_INSTALLATION_ROOT"
            git config core.worktree "$env:VCPKG_INSTALLATION_ROOT"
            git fetch --unshallow || true
            git fetch origin master
        }

    - name: Restore vcpkg Cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ runner.os == 'Linux' && '/usr/local/share/vcpkg' || 'C:\vcpkg' }}/installed
          ${{ runner.os == 'Linux' && '/usr/local/share/vcpkg' || 'C:\vcpkg' }}/packages
          ${{ runner.os == 'Linux' && '/usr/local/share/vcpkg' || 'C:\vcpkg' }}/buildtrees
          ${{ runner.os == 'Linux' && '/usr/local/share/vcpkg' || 'C:\vcpkg' }}/downloads
        key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}-${{ hashFiles('vcpkg-overlay-ports/**') }}
        restore-keys: |
          vcpkg-${{ runner.os }}-

    - name: Configure CMake
      shell: bash
      run: |
        for i in {1..3}; do
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cmake -B build -S . -G Ninja \
            -DCMAKE_C_COMPILER="C:/Program Files/LLVM/bin/clang-cl.exe" \
            -DCMAKE_CXX_COMPILER="C:/Program Files/LLVM/bin/clang-cl.exe" \
            -DCMAKE_MAKE_PROGRAM="C:/ProgramData/chocolatey/bin/ninja.exe" \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-windows-static \
            -DVCPKG_OVERLAY_PORTS="${GITHUB_WORKSPACE}/vcpkg-overlay-ports/ports" && break
          else
            cmake -B build -S . -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_FLAGS="-fsanitize=address" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DCMAKE_MAKE_PROGRAM=$(which ninja) \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_OVERLAY_PORTS="${GITHUB_WORKSPACE}/vcpkg-overlay-ports/ports" && break
          fi
          echo "CMake configuration failed (Attempt $i), retrying in 30 seconds..."
          sleep 30
          # Clean up partial install if needed
          rm -rf build/vcpkg_installed || true
        done

    - name: Build
      shell: bash
      run: cmake --build build --config ${{ matrix.build_type }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AliceViewer-${{ runner.os }}
        path: |
          build/bin/AliceViewer
          build/bin/AliceViewer.exe
        if-no-files-found: error
